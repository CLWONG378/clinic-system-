<!DOCTYPE html>

<html lang="zh-hk">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
會員資料 - 樂活醫療 lohas medical
</title>


<link rel="stylesheet" href="../assets/css/style.css">


</head>



<body>


<header>


<h1>
樂活醫療 lohas medical
</h1>


<p>
360度會員視圖
</p>


</header>




<main>


<section>


<h2>
會員資料
</h2>


<div id="profile">


<label>
姓名
</label>

<input id="profile-name">



<label>
電話
</label>

<input id="profile-phone">



<label>
電郵
</label>

<input id="profile-email">



<label>
出生日期
</label>

<input 
id="profile-birthday"
type="date">



<label>
性別
</label>

<select id="profile-gender">


<option value="">
請選擇
</option>


<option>
男
</option>


<option>
女
</option>


</select>




<label>
地址
</label>

<input id="profile-address">



<label>
備註
</label>


<textarea id="profile-notes"></textarea>



<button id="save-profile">

儲存資料

</button>



</div>





</section>





<section>


<h2>
預約歷史
</h2>


<div id="history">

Loading...

</div>


</section>




<section>


<h2>
服務記錄
</h2>

<section>


<h2>
客户回訪
</h2>


<div id="followups">

Loading...

</div>



<h3>
新增回訪
</h3>


<input
id="followup-date"
type="date">



<select id="followup-status">

<option>
已聯絡
</option>


<option>
未接通
</option>


<option>
需要跟進
</option>


</select>



<textarea
id="followup-notes"
placeholder="回訪內容">
</textarea>



<button id="add-followup">

新增回訪

</button>


</section>
<h2>
會員套餐
</h2>


<div id="packages">

Loading...

</div>



<h3>
購買新套餐
</h3>


<select id="package-select">

</select>


<button id="buy-package">

購買套餐

</button>


</section>



<div id="treatments">

Loading...

</div>



<h3>
新增服務記錄
</h3>

<select id="treatment-service">


<option value="spinal_correction">
脊柱矯正
</option>


<option value="pain_rehabilitation">
疼痛康復
</option>


<option value="posture_adjustment">
體態調整
</option>


<option value="foot_treatment">
足科治療
</option>


</select>



<input 
id="treatment-date"
type="date">



<textarea
id="treatment-notes"
placeholder="輸入服務記錄">
</textarea>


<input
id="treatment-image"
type="file">



<button id="add-treatment">

新增記錄

</button>

</section>



</main>




<script src="../assets/js/member-profile.js"></script>


</body>


</html>
